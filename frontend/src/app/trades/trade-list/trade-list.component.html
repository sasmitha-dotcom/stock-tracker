<div class="page-header">
  <h1>Trades</h1>
  <button mat-raised-button color="primary" (click)="openAddDialog()">+ Add Trade</button>
</div>

@if (loading) {
  <div class="spinner-wrap"><mat-spinner diameter="40"></mat-spinner></div>
}

<table mat-table [dataSource]="trades" class="trade-table mat-elevation-z2">

  <ng-container matColumnDef="symbol">
    <th mat-header-cell *matHeaderCellDef>Symbol</th>
    <td mat-cell *matCellDef="let t">{{ t.symbol }}</td>
  </ng-container>

  <ng-container matColumnDef="type">
    <th mat-header-cell *matHeaderCellDef>Type</th>
    <td mat-cell *matCellDef="let t">
      <span [class]="t.type === 'BUY' ? 'badge-buy' : 'badge-sell'">{{ t.type }}</span>
    </td>
  </ng-container>

  <ng-container matColumnDef="quantity">
    <th mat-header-cell *matHeaderCellDef>Qty</th>
    <td mat-cell *matCellDef="let t">{{ t.quantity }}</td>
  </ng-container>

  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef>Price</th>
    <td mat-cell *matCellDef="let t">{{ t.price | currency }}</td>
  </ng-container>

  <ng-container matColumnDef="trade_date">
    <th mat-header-cell *matHeaderCellDef>Date</th>
    <td mat-cell *matCellDef="let t">{{ t.trade_date | date:'mediumDate' }}</td>
  </ng-container>

  <ng-container matColumnDef="notes">
    <th mat-header-cell *matHeaderCellDef>Notes</th>
    <td mat-cell *matCellDef="let t">{{ t.notes }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let t">
      <button mat-icon-button (click)="openEditDialog(t)" title="Edit">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="delete(t)" title="Delete">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

@if (!loading && trades.length === 0) {
  <p class="empty-state">No trades yet. Add your first trade!</p>
}
